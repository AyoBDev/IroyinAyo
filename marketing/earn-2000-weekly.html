<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iroyin Market - Earn ₦2,000/Week</title>
<style>
@font-face {
  font-family: 'Fraunces';
  src: url('../prediction-web/public/fonts/fraunces-regular.woff2') format('woff2');
  font-weight: 400;
  font-display: swap;
}
@font-face {
  font-family: 'Instrument Sans';
  src: url('../prediction-web/public/fonts/instrument-sans-regular.woff2') format('woff2');
  font-weight: 400;
  font-display: swap;
}
@font-face {
  font-family: 'Instrument Sans';
  src: url('../prediction-web/public/fonts/instrument-sans-medium.woff2') format('woff2');
  font-weight: 500;
  font-display: swap;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Instrument Sans', ui-sans-serif, system-ui, sans-serif;
  background: #fbf7ef;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.poster {
  width: 1080px;
  height: 1350px;
  background: #fbf7ef;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Subtle warm gradient overlay */
.poster::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(230, 199, 100, 0.12) 0%, transparent 60%);
  pointer-events: none;
}

/* Brand header */
.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  position: absolute;
  top: 60px;
  left: 72px;
  z-index: 2;
}

.brand-icon {
  width: 52px;
  height: 52px;
  background: #0f3d2e;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.brand-icon svg {
  width: 28px;
  height: 28px;
}

.brand-name {
  font-family: 'Fraunces', ui-serif, Georgia, serif;
  font-size: 28px;
  color: #14110f;
  letter-spacing: -0.5px;
}

/* Main text */
.headline {
  position: relative;
  z-index: 2;
  text-align: center;
  margin-top: 200px;
}

.headline .pre {
  font-family: 'Instrument Sans', ui-sans-serif, system-ui, sans-serif;
  font-size: 42px;
  font-weight: 400;
  color: #14110f;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}

.headline .amount {
  font-family: 'Fraunces', ui-serif, Georgia, serif;
  font-size: 120px;
  color: #0f3d2e;
  letter-spacing: -4px;
  line-height: 1.1;
  font-weight: 400;
}

.headline .sub {
  font-family: 'Instrument Sans', ui-sans-serif, system-ui, sans-serif;
  font-size: 38px;
  font-weight: 400;
  color: #2a2521;
  letter-spacing: -0.3px;
  margin-top: 12px;
}

/* Naira notes illustration */
.notes-container {
  position: relative;
  z-index: 2;
  margin-top: 60px;
  width: 600px;
  height: 480px;
}

.hand-notes {
  width: 100%;
  height: 100%;
}

/* Bottom CTA */
.cta-section {
  position: absolute;
  bottom: 80px;
  left: 0;
  right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  z-index: 2;
}

.cta-row {
  display: flex;
  align-items: center;
  gap: 16px;
}

.cta-text {
  font-family: 'Instrument Sans', ui-sans-serif, system-ui, sans-serif;
  font-size: 26px;
  font-weight: 500;
  color: #14110f;
}

.cta-pill {
  background: #0f3d2e;
  color: #fbf7ef;
  font-family: 'Instrument Sans', ui-sans-serif, system-ui, sans-serif;
  font-size: 22px;
  font-weight: 500;
  padding: 14px 32px;
  border-radius: 9999px;
  letter-spacing: -0.2px;
}

.terms {
  font-family: 'Instrument Sans', ui-sans-serif, system-ui, sans-serif;
  font-size: 18px;
  color: #6b6055;
  margin-top: 4px;
}

/* Gold decorative accent */
.accent-line {
  position: absolute;
  top: 160px;
  right: 60px;
  width: 80px;
  height: 4px;
  background: #e6c764;
  border-radius: 2px;
}

.accent-dot {
  position: absolute;
  bottom: 200px;
  left: 60px;
  width: 12px;
  height: 12px;
  background: #e6c764;
  border-radius: 50%;
}
</style>
</head>
<body>

<div class="poster">

      <!-- Naira Note 4 (topmost, fan out) -->

  </div>

  <!-- CTA -->
  <div class="cta-section">
    <div class="cta-row">
      <span class="cta-text">Start predicting today</span>

</body>
</html>
